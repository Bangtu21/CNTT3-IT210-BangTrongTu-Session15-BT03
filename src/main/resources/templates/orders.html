<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Lịch sử đơn hàng</h1>

<form action="/orders" method="get">
    <input type="hidden" name="sortBy" value="createdDate">
    <input type="hidden" name="direction" value="desc">
    <select name="status">
        <option value="ALL">Tất cả</option>
        <option value="Đang giao">Đang giao</option>
        <option value="Đã hủy">Đã hủy</option>
        <option value="Hoàn thành">Hoàn thành</option>
    </select>

    <button type="submit">Lọc</button>
</form>

<div class="sort">
    <a th:href="@{/orders(status=${param.status},sortBy='createdDate',direction='desc')}">Ngày mới nhất</a>
    <a href="/orders?sortBy=createdDate&direction=asc">Ngày cũ nhất</a>

    <a href="/orders?sortBy=totalPrice&direction=desc">Giá cao nhất</a>
    <a href="/orders?sortBy=totalPrice&direction=asc">Giá thấp nhất</a>
</div>

<div class="empty"
     th:if="${orders == null or orders.isEmpty()}">
    Không có đơn hàng nào
</div>

<table th:if="${orders != null and !orders.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Trạng thái</th>
        <th>Tổng tiền</th>
        <th>Ngày tạo</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.userId}"></td>
        <td th:text="${order.status}"></td>
        <td th:text="${order.totalPrice}"></td>
        <td th:text="${order.createdDate}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
